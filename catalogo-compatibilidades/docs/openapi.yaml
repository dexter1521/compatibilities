openapi: 3.0.3
info:
  title: Shark Compatibility Engine API
  version: 1.0.0
  description: API REST para catálogo de compatibilidades Shark Motors.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiSuccess:
      type: object
      properties:
        status: { type: integer, example: 200 }
        success: { type: boolean, example: true }
        data: {}
        message: { type: string, example: Consulta exitosa }
        errors:
          nullable: true
          type: object
    ApiError:
      type: object
      properties:
        status: { type: integer, example: 422 }
        success: { type: boolean, example: false }
        data:
          nullable: true
        message: { type: string, example: Validación fallida }
        errors:
          type: object
paths:
  /api/v1/auth/login:
    post:
      security: []
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200': { description: OK }
        '401': { description: Credenciales inválidas }
  /api/v1/auth/refresh:
    post:
      security: []
      summary: Refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        '200': { description: OK }
        '401': { description: Token inválido }
  /api/v1/auth/me:
    get:
      summary: Usuario autenticado
      responses:
        '200': { description: OK }
        '401': { description: No autenticado }
  /api/v1/auth/logout:
    post:
      summary: Logout
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
      responses:
        '200': { description: OK }

  /api/v1/search:
    get:
      summary: Búsqueda inteligente
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50 }
      responses:
        '200': { description: OK }
  /api/v1/compatibilidades/{id}/confirmar:
    patch:
      summary: Confirmar compatibilidad
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
        '403': { description: Rol insuficiente }

  /api/v1/productos:
    get:
      summary: Listar productos
      responses:
        '200': { description: OK }
    post:
      summary: Crear producto (admin)
      responses:
        '201': { description: Creado }
        '403': { description: Rol insuficiente }
  /api/v1/productos/{id}:
    get:
      summary: Ver producto
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
        '404': { description: No encontrado }
    put:
      summary: Actualizar producto (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
        '403': { description: Rol insuficiente }
    delete:
      summary: Eliminar producto (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
        '403': { description: Rol insuficiente }

  /api/v1/motocicletas:
    get: { summary: Listar motocicletas, responses: { '200': { description: OK } } }
    post: { summary: Crear motocicleta (admin), responses: { '201': { description: Creado }, '403': { description: Rol insuficiente } } }
  /api/v1/motocicletas/{id}:
    get: { summary: Ver motocicleta, responses: { '200': { description: OK }, '404': { description: No encontrada } } }
    put: { summary: Actualizar motocicleta (admin), responses: { '200': { description: OK }, '403': { description: Rol insuficiente } } }
    delete: { summary: Eliminar motocicleta (admin), responses: { '200': { description: OK }, '403': { description: Rol insuficiente } } }

  /api/v1/piezas:
    get: { summary: Listar piezas, responses: { '200': { description: OK } } }
    post: { summary: Crear pieza (admin), responses: { '201': { description: Creado }, '403': { description: Rol insuficiente } } }
  /api/v1/piezas/{id}:
    get: { summary: Ver pieza, responses: { '200': { description: OK }, '404': { description: No encontrada } } }
    put: { summary: Actualizar pieza (admin), responses: { '200': { description: OK }, '403': { description: Rol insuficiente } } }
    delete: { summary: Eliminar pieza (admin), responses: { '200': { description: OK }, '403': { description: Rol insuficiente } } }

  /api/v1/aliases:
    get: { summary: Listar aliases, responses: { '200': { description: OK } } }
    post: { summary: Crear alias (admin), responses: { '201': { description: Creado }, '403': { description: Rol insuficiente } } }
  /api/v1/aliases/{id}:
    delete: { summary: Eliminar alias (admin), responses: { '200': { description: OK }, '403': { description: Rol insuficiente } } }

  /api/v1/compatibilidades:
    get: { summary: Listar compatibilidades, responses: { '200': { description: OK } } }
    post: { summary: Crear compatibilidad (admin), responses: { '201': { description: Creado }, '403': { description: Rol insuficiente } } }
  /api/v1/compatibilidades/{id}:
    get: { summary: Ver compatibilidad, responses: { '200': { description: OK }, '404': { description: No encontrada } } }
    put: { summary: Actualizar compatibilidad (admin), responses: { '200': { description: OK }, '403': { description: Rol insuficiente } } }
    delete: { summary: Eliminar compatibilidad (admin), responses: { '200': { description: OK }, '403': { description: Rol insuficiente } } }

  /api/v1/import/productos:
    post:
      summary: Importar productos (admin)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                archivo:
                  type: string
                  format: binary
      responses:
        '201': { description: Importación completada }
        '403': { description: Rol insuficiente }
