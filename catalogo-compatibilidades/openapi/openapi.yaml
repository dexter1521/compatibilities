openapi: 3.0.3
info:
  title: Shark Compatibility Engine API
  version: 1.0.0
  description: API REST del catálogo de compatibilidades Shark Motors (v1, sin breaking changes).
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiEnvelopeSuccess:
      type: object
      required: [status, success, data, message, errors]
      properties:
        status:
          type: integer
          example: 200
        success:
          type: boolean
          example: true
        data:
          nullable: true
        message:
          type: string
          example: Consulta exitosa
        errors:
          nullable: true
          type: object
          example: null
    ApiEnvelopeError:
      type: object
      required: [status, success, data, message, errors]
      properties:
        status:
          type: integer
          example: 422
        success:
          type: boolean
          example: false
        data:
          nullable: true
          example: null
        message:
          type: string
          example: Validación fallida
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email: ["El campo email es obligatorio."]
    MetaPaginacion:
      type: object
      properties:
        page: { type: integer, example: 1 }
        per_page: { type: integer, example: 20 }
        total: { type: integer, example: 125 }
        last_page: { type: integer, example: 7 }
        sort_by: { type: string, example: id }
        sort_dir: { type: string, example: desc }
        filters:
          type: object
          additionalProperties: true
        timezone: { type: string, example: UTC }
    Producto:
      type: object
      properties:
        id: { type: integer, example: 10 }
        proveedor_id: { type: integer, example: 1 }
        proveedor_nombre: { type: string, nullable: true, example: DID }
        pieza_maestra_id: { type: integer, nullable: true, example: 7 }
        pieza_nombre: { type: string, nullable: true, example: Balatas delanteras }
        clave_proveedor: { type: string, example: BB-123 }
        nombre: { type: string, example: Balata Delantera Italika FT150 }
        activo: { type: integer, example: 1 }
        enrich_estado: { type: string, nullable: true, example: ok }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time, nullable: true }
    SearchMeta:
      type: object
      properties:
        page: { type: integer, example: 1 }
        per_page: { type: integer, example: 20 }
        total: { type: integer, example: 3 }
        last_page: { type: integer, example: 2 }
        sort_by: { type: string, example: relevancia }
        sort_dir: { type: string, example: desc }
        filters:
          type: object
          properties:
            q: { type: string, example: ft150 balata }
        timezone: { type: string, example: UTC }
    SearchMissedItem:
      type: object
      properties:
        id: { type: integer, example: 15 }
        termino: { type: string, example: "kit de arranque" }
        termino_normalizado: { type: string, example: "kit de arranque" }
        contador: { type: integer, example: 8 }
        ultima_busqueda_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
    Marca:
      type: object
      properties:
        id: { type: integer, example: 1 }
        nombre: { type: string, example: Kawasaki }
        slug: { type: string, example: kawasaki }
        activo: { type: integer, example: 1 }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
    Moto:
      type: object
      properties:
        id: { type: integer, example: 1 }
        modelo: { type: string, example: Ninja 250 }
        anio_desde: { type: integer, nullable: true, example: 2018 }
        anio_hasta: { type: integer, nullable: true, example: 2022 }
        cilindrada: { type: string, nullable: true, example: 250 }
        marca_id: { type: integer, example: 1 }
        marca_nombre: { type: string, example: Kawasaki }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
    Pieza:
      type: object
      properties:
        id: { type: integer, example: 3 }
        nombre: { type: string, example: Filtro de aceite }
        slug: { type: string, example: filtro-de-aceite }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
    Alias:
      type: object
      properties:
        id: { type: integer, example: 8 }
        motocicleta_id: { type: integer, example: 12 }
        alias: { type: string, example: FZ150 }
        moto_modelo: { type: string, example: Ninja 150 }
        marca_nombre: { type: string, example: Yamaha }
        slug: { type: string, example: fz150 }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
    Compatibilidad:
      type: object
      properties:
        id: { type: integer, example: 4 }
        confirmada: { type: integer, enum: [0, 1], example: 1 }
        contador_confirmaciones: { type: integer, example: 12 }
        pieza_maestra_id: { type: integer, example: 3 }
        motocicleta_id: { type: integer, example: 12 }
        pieza_nombre: { type: string, example: Filtro de aceite }
        moto_modelo: { type: string, example: Ninja 150 }
        marca_nombre: { type: string, example: Kawasaki }
        anio_desde: { type: integer, nullable: true, example: 2018 }
        anio_hasta: { type: integer, nullable: true, example: 2022 }
        cilindrada: { type: string, nullable: true, example: 250 }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
    ImportJobResult:
      type: object
      properties:
        job_id: { type: integer, example: 15 }
        estado: { type: string, example: finalizado }
        total_items: { type: integer, example: 120 }
        procesados: { type: integer, example: 118 }
        errores: { type: integer, example: 2 }
  responses:
    Unauthorized:
      description: No autenticado o token inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiEnvelopeError'
          example:
            status: 401
            success: false
            data: null
            message: Token requerido.
            errors:
              authorization: [bearer token requerido]
    Forbidden:
      description: Rol insuficiente
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiEnvelopeError'
          example:
            status: 403
            success: false
            data: null
            message: No tienes permisos para realizar esta acción.
            errors:
              authorization: [rol insuficiente]
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiEnvelopeError'
    ValidationError:
      description: Error de validación
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiEnvelopeError'
    TooManyRequests:
      description: Rate limit excedido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiEnvelopeError'
          example:
            status: 429
            success: false
            data: null
            message: Demasiadas solicitudes. Intenta en un minuto.
            errors:
              rate_limit: [excedido]

paths:
  /api/v1/auth/login:
    post:
      security: []
      summary: Iniciar sesión
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 6 }
            example:
              email: admin@sharkmotors.local
              password: Admin123!
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeSuccess'
              example:
                status: 200
                success: true
                data:
                  user:
                    id: 1
                    role_id: 1
                    nombre: Administrador API
                    email: admin@sharkmotors.local
                    activo: 1
                    role_slug: admin
                  access_token: <jwt>
                  refresh_token: <refresh>
                  token_type: Bearer
                  expires_in: 3600
                message: Login exitoso.
                errors: null
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /api/v1/auth/refresh:
    post:
      security: []
      summary: Refrescar access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        '200': { description: Refresh exitoso }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /api/v1/auth/me:
    get:
      summary: Obtener usuario autenticado
      responses:
        '200':
          description: Usuario autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeSuccess'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /api/v1/auth/logout:
    post:
      summary: Cerrar sesión (revoca refresh token si se envía)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
      responses:
        '200': { description: Logout exitoso }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /api/v1/productos:
    get:
      summary: Listar productos
      parameters:
        - { in: query, name: page, schema: { type: integer, minimum: 1, default: 1 } }
        - { in: query, name: per_page, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { in: query, name: sort_by, schema: { type: string, enum: [id, nombre, clave_proveedor, created_at, updated_at, proveedor_nombre], default: id } }
        - { in: query, name: sort_dir, schema: { type: string, enum: [asc, desc], default: desc } }
        - { in: query, name: q, schema: { type: string } }
        - { in: query, name: proveedor_id, schema: { type: integer } }
        - { in: query, name: pieza_maestra_id, schema: { type: integer } }
        - { in: query, name: activo, schema: { type: integer, enum: [0, 1] } }
        - { in: query, name: enrich_estado, schema: { type: string, enum: [ok, sin_tipo, sin_moto, sin_ambos] } }
      responses:
        '200':
          description: Listado paginado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelopeSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Producto'
                          meta:
                            $ref: '#/components/schemas/MetaPaginacion'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    post:
      summary: Crear producto (admin)
      responses:
        '201': { description: Creado }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: Duplicado proveedor+clave }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /api/v1/productos/{id}:
    get:
      summary: Ver producto
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    put:
      summary: Actualizar producto (admin)
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Duplicado proveedor+clave }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    delete:
      summary: Eliminar producto (admin)
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /api/v1/search:
    get:
      summary: Búsqueda de compatibilidades
      parameters:
        - { in: query, name: q, required: true, schema: { type: string, minLength: 2 } }
        - { in: query, name: page, schema: { type: integer, minimum: 1, default: 1 } }
        - { in: query, name: limit, schema: { type: integer, minimum: 1, maximum: 50, default: 50 } }
        - { in: query, name: per_page, schema: { type: integer, minimum: 1, maximum: 50 }, description: Alias legado de limit (sobrescribe limit si se envia) }
      responses:
        '200':
          description: Resultados de búsqueda
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelopeSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              additionalProperties: true
                          meta:
                            $ref: '#/components/schemas/SearchMeta'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /api/v1/search-missed:
    get:
      summary: Listado de búsquedas no encontradas (admin)
      parameters:
        - { in: query, name: page, schema: { type: integer, minimum: 1, default: 1 } }
        - { in: query, name: per_page, schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
        - { in: query, name: sort_by, schema: { type: string, enum: [contador, ultima_busqueda_at, created_at], default: contador } }
        - { in: query, name: sort_dir, schema: { type: string, enum: [asc, desc], default: desc } }
        - { in: query, name: q, schema: { type: string } }
      responses:
        '200':
          description: Listado paginado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelopeSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/SearchMissedItem'
                          meta:
                            $ref: '#/components/schemas/MetaPaginacion'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /api/v1/compatibilidades/{id}/confirmar:
    patch:
      summary: Confirmar compatibilidad (admin|vendedor)
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        '200': { description: Confirmación realizada }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /api/v1/marcas:
    get:
      summary: Listar marcas (paginado, orden y filtros)
      parameters:
        - { in: query, name: page, schema: { type: integer, minimum: 1, default: 1 } }
        - { in: query, name: per_page, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { in: query, name: sort_by, schema: { type: string, enum: [id, nombre, slug, activo, created_at, updated_at], default: nombre } }
        - { in: query, name: sort_dir, schema: { type: string, enum: [asc, desc], default: desc } }
        - { in: query, name: q, schema: { type: string } }
        - { in: query, name: activo, schema: { type: integer, enum: [0, 1] } }
      responses:
        '200':
          description: Listado paginado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelopeSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Marca'
                          meta:
                            $ref: '#/components/schemas/MetaPaginacion'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    post:
      summary: Crear marca (admin)
      responses:
        '201': { description: Creado }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: Marca duplicada }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /api/v1/motocicletas:
    get:
      summary: Listar motocicletas
      parameters:
        - { in: query, name: page, schema: { type: integer, minimum: 1, default: 1 } }
        - { in: query, name: per_page, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { in: query, name: sort_by, schema: { type: string, enum: [id, modelo, marca_id, marca_nombre, anio_desde, anio_hasta, cilindrada, created_at, updated_at], default: id } }
        - { in: query, name: sort_dir, schema: { type: string, enum: [asc, desc], default: desc } }
        - { in: query, name: q, schema: { type: string } }
        - { in: query, name: marca_id, schema: { type: integer } }
      responses:
        '200':
          description: Listado paginado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelopeSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Moto'
                          meta:
                            $ref: '#/components/schemas/MetaPaginacion'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    post:
      summary: Crear motocicleta (admin)
      responses:
        '201': { description: Creado }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /api/v1/motocicletas/{id}:
    get:
      summary: Ver motocicleta
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    put:
      summary: Actualizar motocicleta (admin)
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    delete:
      summary: Eliminar motocicleta (admin)
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /api/v1/piezas:
    get:
      summary: Listar piezas
      parameters:
        - { in: query, name: page, schema: { type: integer, minimum: 1, default: 1 } }
        - { in: query, name: per_page, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { in: query, name: sort_by, schema: { type: string, enum: [id, nombre, slug, created_at, updated_at], default: nombre } }
        - { in: query, name: sort_dir, schema: { type: string, enum: [asc, desc], default: desc } }
        - { in: query, name: q, schema: { type: string } }
      responses:
        '200':
          description: Listado paginado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelopeSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/Pieza'
                          meta:
                            $ref: '#/components/schemas/MetaPaginacion'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    post:
      summary: Crear pieza (admin)
      responses:
        '201': { description: Creado }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /api/v1/piezas/{id}:
    get:
      summary: Ver pieza
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    put:
      summary: Actualizar pieza (admin)
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    delete:
      summary: Eliminar pieza (admin)
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
