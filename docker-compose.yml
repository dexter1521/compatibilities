services:
  app:
    build:
      context: ./catalogo-compatibilidades
      dockerfile: Dockerfile
    container_name: compat_app
    volumes:
      - ./catalogo-compatibilidades:/var/www/html
    depends_on:
      - db
    networks:
      - compat_net

  nginx:
    image: nginx:1.27-alpine
    container_name: compat_nginx
    ports:
      - "8080:80"
    volumes:
      - ./catalogo-compatibilidades:/var/www/html
      - ./catalogo-compatibilidades/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - compat_net

  db:
    image: mariadb:11.4
    container_name: compat_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: compatibilidades
      MARIADB_USER: compat
      MARIADB_PASSWORD: compat123
    volumes:
      - compat_db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - compat_net

  pma:
    image: phpmyadmin:latest
    container_name: compat_pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - compat_net

volumes:
  compat_db_data:

networks:
  compat_net:
    driver: bridge
